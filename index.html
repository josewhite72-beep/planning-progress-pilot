    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&family=Outfit:wght@800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #fbbf24;
            --accent-purple: #8b5cf6;
            --accent-orange: #f97316;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease-out;
        }
        
        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.5rem);
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            font-weight: 300;
        }
        
        .grades-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .grade-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out backwards;
        }
        
        .grade-card:nth-child(1) { animation-delay: 0.1s; }
        .grade-card:nth-child(2) { animation-delay: 0.15s; }
        .grade-card:nth-child(3) { animation-delay: 0.2s; }
        .grade-card:nth-child(4) { animation-delay: 0.25s; }
        .grade-card:nth-child(5) { animation-delay: 0.3s; }
        .grade-card:nth-child(6) { animation-delay: 0.35s; }
        .grade-card:nth-child(7) { animation-delay: 0.4s; }

        .grade-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            box-shadow: 0 15px 50px rgba(59, 130, 246, 0.3);
        }
        
        .grade-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .grade-name {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.8rem;

        }
        
        .cefr-badge {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));

            padding: 6px 14px;

        .current-status {

        .status-label {

        .action-buttons {

        .btn {
            flex: 1;
            padding: 12px;
            border: none;

            font-family: 'Lexend', sans-serif;

            font-size: 0.95rem;

        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));

        }
        
        .btn-primary:hover {

            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--bg-card);
        }
        
        .btn-secondary:hover {

        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);

            justify-content: center;

            animation: fadeIn 0.3s ease-out;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
            animation: scaleIn 0.3s ease-out;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-family: 'Outfit', sans-serif;

        .close-btn {
            background: none;

        .close-btn:hover {

        .lesson-selector {

        .lesson-item {

        .lesson-item:hover {

        .lesson-item.completed {
            border-color: var(--accent-green);

        }
        
        .lesson-item.current {
            border-color: var(--accent-yellow);

        }
        
        .lesson-info {
            flex: 1;
        }
        
        .lesson-title {

        .lesson-skill {

        .lesson-status {
            padding: 8px 16px;

            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .lesson-status.completed {
            background: var(--accent-green);
            color: white;
        }
        
        .lesson-status.current {
            background: var(--accent-yellow);
            color: var(--bg-primary);
        }
        
        .lesson-status.pending {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
        
        .stage-info {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .stage-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent-blue);
        }
        
        .stages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }
        
        .stage-box {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 8px;

            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .stage-box.completed {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }
        
        .stage-box.current {
            border-color: var(--accent-yellow);
            background: rgba(251, 191, 36, 0.2);

        .stage-number {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stage-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        .review-section {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.1), rgba(239, 68, 68, 0.1));
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-orange);
        }
        
        .review-title {
            font-weight: 600;
            margin-bottom: 12px;

        }
        
        .review-options {

        .review-btn {
            background: var(--bg-card);
            border: 2px solid var(--accent-orange);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Lexend', sans-serif;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .review-btn:hover {
            background: var(--accent-orange);

            transform: scale(1.02);
        }
        
        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);

        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

                opacity: 1;

            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.1);
                opacity: 0.8;
            }
        }
        
        /* Quick Actions */
        .quick-actions {
            background: var(--bg-card);
            padding: 24px;

        .quick-actions-title {
            font-weight: 600;
            font-size: 1.2rem;

            color: var(--accent-blue);
        }
        
        .quick-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            background: var(--bg-secondary);

            transition: all 0.3s ease;
        }
        
        .quick-btn:hover {

            transform: translateY(-2px);

        /* Responsive */
        @media (max-width: 768px) {
            .grades-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                padding: 24px;
            }
            
            .stages-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Planning Progress Pilot</h1>
            <p class="subtitle">English Curriculum Tracker | PreK-6th Grade</p>
        </header>
        
        <div class="quick-actions">
            <div class="quick-actions-title">⚡ Acciones Rápidas</div>
            <div class="quick-buttons">
                <button class="quick-btn" onclick="exportData()">📥 Exportar Progreso</button>
                <button class="quick-btn" onclick="importData()">📤 Importar Progreso</button>
                <button class="quick-btn" onclick="resetAllData()">🔄 Reiniciar Todo</button>
            </div>
        </div>
        
        <div class="grades-grid" id="gradesGrid"></div>
    </div>
    
    <!-- Modal -->
    <div class="modal" id="gradeModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            
            <div class="stage-info">
                <div class="stage-title">📍 6 Etapas AoA (Action-oriented Approach)</div>
                <div class="stages-grid" id="stagesGrid"></div>
            </div>
            
            <div class="review-section">
                <div class="review-title">🔄 ¿Necesitas repasar antes de continuar?</div>
                <div class="review-options">
                    <button class="review-btn" onclick="reviewPreviousLesson()">Repasar lección anterior</button>
                    <button class="review-btn" onclick="reviewCurrentTheme()">Repasar tema completo</button>
                    <button class="review-btn" onclick="reviewVocabulary()">Repasar vocabulario clave</button>
                </div>
            </div>
            
            <div id="scenarioInfo" style="margin-bottom: 20px;"></div>
            
            <div class="lesson-selector" id="lessonSelector"></div>
            
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn btn-primary" onclick="markLessonComplete()">✓ Marcar Lección Completada</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
            </div>
        </div>
    </div>
    
    <script>
        // Datos de los grados - Currículo Nacional de Panamá
        const grades = [
            { id: 'prek', name: 'PreK', cefr: 'Pre A1.1', scenarioNum: 1, scenario: 'Meeting New Friends', themeNum: 1, theme: 'Meeting My Friends' },
            { id: 'k', name: 'Kinder', cefr: 'Pre A1.2', scenarioNum: 1, scenario: 'It\'s a School Day!', themeNum: 1, theme: 'Let\'s Listen!' },
            { id: 'g1', name: '1er Grado', cefr: 'Pre A1.3', scenarioNum: 1, scenario: 'All Week Long!', themeNum: 1, theme: 'Today Is Tuesday!' },
            { id: 'g2', name: '2do Grado', cefr: 'Pre A1.4', scenarioNum: 1, scenario: 'School Days', themeNum: 1, theme: 'Yesterday Was Wednesday.' },
            { id: 'g3', name: '3er Grado', cefr: 'A1.1', scenarioNum: 1, scenario: 'Places I Can Go', themeNum: 1, theme: 'I\'m at School.' },
            { id: 'g4', name: '4to Grado', cefr: 'A1.2', scenarioNum: 1, scenario: 'A Walk in the Neighborhood', themeNum: 1, theme: 'This Is My Favorite.' },
            { id: 'g5', name: '5to Grado', cefr: 'A1.3', scenarioNum: 1, scenario: 'Following Instructions at School', themeNum: 1, theme: 'First, I Cut the Paper.' },
            { id: 'g6', name: '6to Grado', cefr: 'A2.1', scenarioNum: 1, scenario: 'Reporting From the School!', themeNum: 1, theme: 'Our Community is Diverse!' }
        ];
        
        const lessons = [
            { id: 1, name: 'Lesson 1', skill: 'Listening' },
            { id: 2, name: 'Lesson 2', skill: 'Reading' },
            { id: 3, name: 'Lesson 3', skill: 'Speaking' },
            { id: 4, name: 'Lesson 4', skill: 'Writing' },
            { id: 5, name: 'Lesson 5', skill: 'Mediation' }
        ];
        
        const aoaStages = [
            { id: 1, name: 'Warm-up' },
            { id: 2, name: 'Presentation' },
            { id: 3, name: 'Preparation' },
            { id: 4, name: 'Performance' },
            { id: 5, name: 'Assessment' },
            { id: 6, name: 'Reflection' }
        ];
        
        let currentGradeId = null;
        
        // Inicializar datos desde localStorage
        function initializeData() {
            if (!localStorage.getItem('gradeProgress')) {
                const initialData = {};
                grades.forEach(grade => {
                    initialData[grade.id] = {
                        currentLesson: 1,
                        currentStage: 1,
                        completedLessons: [],
                        reviewMode: false
                    };
                });
                localStorage.setItem('gradeProgress', JSON.stringify(initialData));
            }
        }
        
        function getProgress(gradeId) {
            const data = JSON.parse(localStorage.getItem('gradeProgress'));
            return data[gradeId];
        }
        
        function updateProgress(gradeId, updates) {
            const data = JSON.parse(localStorage.getItem('gradeProgress'));
            data[gradeId] = { ...data[gradeId], ...updates };
            localStorage.setItem('gradeProgress', JSON.stringify(data));
            renderGrades();
        }
        
        // Renderizar tarjetas de grados
        function renderGrades() {
            const grid = document.getElementById('gradesGrid');
            grid.innerHTML = '';
            
            grades.forEach(grade => {
                const progress = getProgress(grade.id);
                const card = document.createElement('div');
                card.className = 'grade-card';
                card.onclick = () => openGradeModal(grade.id);
                
                const completedCount = progress.completedLessons.length;
                const currentLesson = lessons.find(l => l.id === progress.currentLesson);
                
                card.innerHTML = `
                    <div class="grade-header">
                        <div class="grade-name">${grade.name}</div>
                        <div class="cefr-badge">${grade.cefr}</div>
                    </div>
                    
                    <div class="current-status">
                        <div class="status-label">📚 Scenario ${grade.scenarioNum}:</div>
                        <div class="status-value" style="font-size: 0.9rem;">${grade.scenario}</div>
                    </div>
                    
                    <div class="current-status">
                        <div class="status-label">📌 Estás en:</div>
                        <div class="status-value">${currentLesson ? currentLesson.name : 'Completado'} - ${currentLesson ? currentLesson.skill : 'Todo'}</div>
                    </div>
                    
                    <div class="current-status">
                        <div class="status-label">🎯 Theme ${grade.themeNum}:</div>
                        <div class="status-value" style="font-size: 0.95rem;">${grade.theme}</div>
                    </div>
                    
                    <div class="lesson-progress">
                        ${lessons.map(lesson => {
                            let className = 'lesson-dot';
                            if (progress.completedLessons.includes(lesson.id)) {
                                className += ' completed';
                            } else if (lesson.id === progress.currentLesson) {
                                className += ' current';
                            }
                            return `<div class="${className}" title="${lesson.name} - ${lesson.skill}"></div>`;
                        }).join('')}
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="event.stopPropagation(); openGradeModal('${grade.id}')">
                            Ver Detalles
                        </button>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }
        
        // Abrir modal de grado
        function openGradeModal(gradeId) {
            currentGradeId = gradeId;
            const grade = grades.find(g => g.id === gradeId);
            const progress = getProgress(gradeId);
            
            document.getElementById('modalTitle').textContent = `${grade.name} - ${grade.cefr}`;
            
            // Información del scenario
            const scenarioInfo = document.getElementById('scenarioInfo');
            scenarioInfo.innerHTML = `
                <div class="current-status">
                    <div class="status-label">📖 Scenario:</div>
                    <div class="status-value">${grade.scenario}</div>
                </div>
                <div class="current-status" style="margin-top: 12px;">
                    <div class="status-label">🎯 Theme:</div>
                    <div class="status-value">${grade.theme}</div>
                </div>
            `;
            
            // Renderizar etapas AoA
            renderStages(progress);
            
            // Renderizar lecciones
            renderLessons(progress);
            
            document.getElementById('gradeModal').classList.add('active');
        }
        
        function renderStages(progress) {
            const stagesGrid = document.getElementById('stagesGrid');
            stagesGrid.innerHTML = '';
            
            aoaStages.forEach(stage => {
                const box = document.createElement('div');
                box.className = 'stage-box';
                
                if (stage.id < progress.currentStage) {
                    box.classList.add('completed');
                } else if (stage.id === progress.currentStage) {
                    box.classList.add('current');
                }
                
                box.innerHTML = `
                    <div class="stage-number">${stage.id}</div>
                    <div class="stage-name">${stage.name}</div>
                `;
                
                stagesGrid.appendChild(box);
            });
        }
        
        function renderLessons(progress) {
            const selector = document.getElementById('lessonSelector');
            selector.innerHTML = '';
            
            lessons.forEach(lesson => {
                const item = document.createElement('div');
                item.className = 'lesson-item';
                
                let statusClass = 'pending';
                let statusText = 'Pendiente';
                
                if (progress.completedLessons.includes(lesson.id)) {
                    item.classList.add('completed');
                    statusClass = 'completed';
                    statusText = 'Completada';
                } else if (lesson.id === progress.currentLesson) {
                    item.classList.add('current');
                    statusClass = 'current';
                    statusText = `Etapa ${progress.currentStage}/6`;
                }
                
                item.innerHTML = `
                    <div class="lesson-info">
                        <div class="lesson-title">${lesson.name}</div>
                        <div class="lesson-skill">Skill: ${lesson.skill}</div>
                    </div>
                    <div class="lesson-status ${statusClass}">${statusText}</div>
                `;
                
                item.onclick = () => selectLesson(lesson.id);
                
                selector.appendChild(item);
            });
        }
        
        function selectLesson(lessonId) {
            const progress = getProgress(currentGradeId);
            
            if (progress.completedLessons.includes(lessonId)) {
                if (confirm('Esta lección ya está completada. ¿Deseas revisarla?')) {
                    updateProgress(currentGradeId, {
                        currentLesson: lessonId,
                        currentStage: 1,
                        reviewMode: true
                    });
                    openGradeModal(currentGradeId);
                }
            } else {
                updateProgress(currentGradeId, {
                    currentLesson: lessonId,
                    currentStage: 1,
                    reviewMode: false
                });
                openGradeModal(currentGradeId);
            }
        }
        
        function markLessonComplete() {
            const progress = getProgress(currentGradeId);
            const currentLesson = progress.currentLesson;
            
            if (progress.currentStage < 6) {
                // Avanzar a siguiente etapa
                updateProgress(currentGradeId, {
                    currentStage: progress.currentStage + 1
                });
                alert(`✓ Etapa ${progress.currentStage} completada. Ahora en Etapa ${progress.currentStage + 1}/6`);
            } else {
                // Completar lección y avanzar a la siguiente
                const completedLessons = [...progress.completedLessons, currentLesson];
                const nextLesson = currentLesson < 5 ? currentLesson + 1 : 1;
                
                updateProgress(currentGradeId, {
                    completedLessons,
                    currentLesson: nextLesson,
                    currentStage: 1
                });
                
                alert(`✓ ${lessons.find(l => l.id === currentLesson).name} completada! Ahora en ${lessons.find(l => l.id === nextLesson).name}`);
            }
            
            openGradeModal(currentGradeId);
        }
        
        function reviewPreviousLesson() {
            const progress = getProgress(currentGradeId);
            const prevLesson = progress.currentLesson > 1 ? progress.currentLesson - 1 : 5;
            
            updateProgress(currentGradeId, {
                currentLesson: prevLesson,
                currentStage: 1,
                reviewMode: true
            });
            
            alert(`📚 Modo repaso activado: ${lessons.find(l => l.id === prevLesson).name}`);
            openGradeModal(currentGradeId);
        }
        
        function reviewCurrentTheme() {
            alert('📚 Repaso del tema completo: revisa vocabulario, gramática y objetivos del tema actual.');
        }
        
        function reviewVocabulary() {
            alert('📚 Repaso de vocabulario: revisa las palabras clave del tema actual.');
        }
        
        function closeModal() {
            document.getElementById('gradeModal').classList.remove('active');
        }
        
        function exportData() {
            const data = localStorage.getItem('gradeProgress');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'progreso-ingles-backup.json';
            a.click();
            alert('✓ Progreso exportado exitosamente');
        }
        
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        localStorage.setItem('gradeProgress', JSON.stringify(data));
                        renderGrades();
                        alert('✓ Progreso importado exitosamente');
                    } catch (error) {
                        alert('❌ Error al importar. Verifica el archivo.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }
        
        function resetAllData() {
            if (confirm('⚠️ ¿Estás seguro de reiniciar TODO el progreso? Esta acción no se puede deshacer.')) {
                if (confirm('⚠️ ÚLTIMA CONFIRMACIÓN: Se borrará todo el progreso de TODOS los grados.')) {
                    localStorage.removeItem('gradeProgress');
                    initializeData();
                    renderGrades();
                    alert('✓ Todo el progreso ha sido reiniciado');
                }
            }
        }
        
        // Cerrar modal al hacer clic fuera
